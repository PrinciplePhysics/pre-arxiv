name: test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    env:
      PORT: "3000"
      SESSION_SECRET: ci
      ADMIN_USERNAMES: eulerine,noether42

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-root-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-root-

      - name: Cache mcp/node_modules
        uses: actions/cache@v4
        with:
          path: mcp/node_modules
          key: ${{ runner.os }}-node-mcp-${{ hashFiles('mcp/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-mcp-

      - name: Install root deps
        run: npm ci

      - name: Install mcp deps
        run: npm ci
        working-directory: mcp

      - name: Reset DB
        run: |
          rm -f data/*.db data/*.db-shm data/*.db-wal
          node seed.js

      - name: Start server in background
        run: |
          node server.js > server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for /healthz
        run: |
          for i in $(seq 1 60); do
            if curl -sS -f -o /dev/null http://localhost:3000/healthz; then
              echo "server is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server did not come up in 60s"
          echo "--- server.log tail ---"
          tail -n 200 server.log || true
          exit 1

      - name: Run REST API tests
        run: python3 tests/prexiv_api_test.py

      - name: Run MCP tests
        run: python3 tests/prexiv_mcp_test.py

      - name: Run safety tests
        run: python3 tests/prexiv_safety_test.py

      - name: Stop server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
            for i in $(seq 1 10); do
              if ! kill -0 "$SERVER_PID" 2>/dev/null; then break; fi
              sleep 1
            done
            kill -9 "$SERVER_PID" 2>/dev/null || true
          fi

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
          if-no-files-found: ignore
